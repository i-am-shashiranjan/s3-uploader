<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vaultex · Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
<div class="noise"></div>
<div class="grid-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="login-wrapper">
  <div class="login-card" id="loginCard">

    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 40 40" fill="none">
          <path d="M20 4L36 12V28L20 36L4 28V12L20 4Z" stroke="currentColor" stroke-width="2"/>
          <path d="M20 4L20 36M4 12L36 28M36 12L4 28" stroke="currentColor" stroke-width="1" opacity="0.4"/>
          <circle cx="20" cy="20" r="5" fill="currentColor"/>
        </svg>
      </div>
      <span class="brand-name">VAULTEX</span>
    </div>

    <h1 class="headline">Welcome<br><span class="accent">Back.</span></h1>
    <p class="sub">Sign in to access your secure S3 file vault</p>

    <div class="form-group">
      <label for="username">Username</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <input type="text" id="username" placeholder="Enter username" autocomplete="username"/>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password"/>
        <button class="toggle-pw" id="togglePw" type="button">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="error-msg" id="errorMsg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="errorText">Invalid credentials</span>
    </div>

    <button class="btn-login" id="loginBtn" type="button">
      <span class="btn-text">Sign In</span>
      <div class="btn-spinner" id="btnSpinner"></div>
      <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </button>

    <p class="hint">🔒 Developed By <strong> M O O N</strong></p>
  </div>
</div>

<script src="/static/js/login.js"></script>
</body>
</html>
